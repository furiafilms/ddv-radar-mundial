name: DDV Prensa Monitor Semanal

on:
  workflow_dispatch:
  schedule:
    # Lunes 09:30 Argentina = 12:30 UTC
    - cron: '30 12 * * 1'

permissions:
  contents: read
  issues: write

jobs:
  prensa-monitor:
    runs-on: ubuntu-latest

    env:
      DDV_PRENSA_MONITOR_URL: ${{ secrets.DDV_PRENSA_MONITOR_URL }}

    steps:
      - name: Iniciar job
        shell: bash
        run: |
          echo "Iniciando DDV Prensa Monitor Semanal..."

      - name: Verificar secret
        shell: bash
        run: |
          if [ -z "${DDV_PRENSA_MONITOR_URL}" ]; then
            echo "ERROR: falta configurar el secret DDV_PRENSA_MONITOR_URL"
            exit 1
          fi
          echo "Secret DDV_PRENSA_MONITOR_URL configurado."

      - name: Parche DNS temporal para danieldelavega.com.ar
        shell: bash
        run: |
          echo "Aplicando parche DNS temporal para GitHub Actions..."
          echo "23.111.161.86 danieldelavega.com.ar www.danieldelavega.com.ar" | sudo tee -a /etc/hosts
          echo "Verificación de hosts:"
          getent hosts danieldelavega.com.ar || true
          getent hosts www.danieldelavega.com.ar || true

      - name: Ejecutar monitor de prensa DDV
        id: ejecutar_monitor
        shell: bash
        run: |
          echo "Llamando al monitor de prensa..."

          set +e
          http_code=$(curl \
            --silent \
            --show-error \
            --location \
            --max-time 120 \
            --retry 2 \
            --retry-delay 10 \
            --output respuesta-prensa-monitor.txt \
            --write-out "%{http_code}" \
            "${DDV_PRENSA_MONITOR_URL}")
          curl_status=$?
          set -e

          echo "HTTP_CODE=${http_code}" >> "${GITHUB_ENV}"
          echo "CURL_STATUS=${curl_status}" >> "${GITHUB_ENV}"

          echo "Estado curl: ${curl_status}"
          echo "Código HTTP recibido: ${http_code}"

          echo "---- Respuesta del monitor ----"
          cat respuesta-prensa-monitor.txt || true
          echo "-------------------------------"

          if [ "${curl_status}" -ne 0 ]; then
            echo "ERROR: curl falló con estado ${curl_status}"
            exit "${curl_status}"
          fi

          if ! [[ "${http_code}" =~ ^[0-9]{3}$ ]]; then
            echo "ERROR: código HTTP inválido: ${http_code}"
            exit 1
          fi

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "ERROR: el monitor respondió con código HTTP ${http_code}"
            exit 1
          fi

          echo "Monitor de prensa ejecutado correctamente."

      - name: Guardar respuesta como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: respuesta-prensa-monitor
          path: respuesta-prensa-monitor.txt
          if-no-files-found: ignore

      - name: Crear issue si falla
        if: failure()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const httpCode = process.env.HTTP_CODE || 'sin código HTTP';
            const curlStatus = process.env.CURL_STATUS || 'sin estado curl';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'DDV Prensa Monitor — error en ejecución semanal',
              body: [
                'Falló la ejecución semanal del monitor de prensa DDV.',
                '',
                'Workflow: DDV Prensa Monitor Semanal',
                '',
                `Run: ${runUrl}`,
                '',
                `Código HTTP: ${httpCode}`,
                `Estado curl: ${curlStatus}`,
                '',
                'Revisar logs y artifact de respuesta.'
              ].join('\n')
            });

      - name: Finalizar job
        if: always()
        shell: bash
        run: |
          echo "Finalizó DDV Prensa Monitor Semanal."
