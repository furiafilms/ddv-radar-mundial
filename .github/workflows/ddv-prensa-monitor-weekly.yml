name: DDV Prensa Monitor Semanal

on:
  workflow_dispatch:
  schedule:
    # Lunes 09:30 Argentina = 12:30 UTC
    - cron: '30 12 * * 1'

permissions:
  contents: read
  issues: write

jobs:
  prensa-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DDV_PRENSA_CRON_URL: ${{ secrets.DDV_PRENSA_CRON_URL }}

    steps:
      - name: Verificar secret
        shell: bash
        run: |
          if [ -z "${DDV_PRENSA_CRON_URL}" ]; then
            echo "::error::Falta configurar el secret DDV_PRENSA_CRON_URL"
            exit 1
          fi
          echo "Secret DDV_PRENSA_CRON_URL configurado."

      - name: Parche DNS temporal para danieldelavega.com.ar
        shell: bash
        run: |
          echo "Aplicando parche DNS temporal para GitHub Actions..."
          echo "23.111.161.86 danieldelavega.com.ar www.danieldelavega.com.ar" | sudo tee -a /etc/hosts
          echo "Verificación DNS local:"
          getent hosts danieldelavega.com.ar || true
          getent hosts www.danieldelavega.com.ar || true

      - name: Ejecutar monitor de prensa DDV
        id: call_monitor
        shell: bash
        run: |
          echo "Llamando al monitor de prensa..."

          # El monitor semanal puede superar los cinco minutos. Se conserva un
          # límite de 15 minutos para evitar procesos indefinidos, sin reintentos
          # automáticos porque el endpoint envía correo y modifica datos.
          set +e
          HTTP_CODE=$(curl -L -sS \
            --connect-timeout 30 \
            --max-time 900 \
            -o prensa-monitor-response.json \
            -w "%{http_code}" \
            "$DDV_PRENSA_CRON_URL")
          CURL_EXIT=$?
          set -e

          echo "HTTP_CODE=$HTTP_CODE" >> "$GITHUB_ENV"
          echo "CURL_EXIT=$CURL_EXIT" >> "$GITHUB_ENV"
          echo "Respuesta HTTP: ${HTTP_CODE:-sin código}"
          echo "Código de salida de curl: $CURL_EXIT"

          if [ "$CURL_EXIT" -ne 0 ]; then
            {
              echo "# DDV Monitor de prensa semanal"
              echo
              echo "- curl_exit: \`$CURL_EXIT\`"
              echo "- http_code: \`${HTTP_CODE:-sin código}\`"
              echo "- resultado: \`falló la espera de GitHub antes de validar el JSON\`"
            } > prensa-monitor-summary.md

            echo "::error::La llamada al monitor terminó con curl exit $CURL_EXIT"
            exit "$CURL_EXIT"
          fi

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::El monitor respondió HTTP $HTTP_CODE"
            cat prensa-monitor-response.json || true
            exit 1
          fi

          python - <<'PY'
          import json
          import sys

          path = "prensa-monitor-response.json"
          try:
              with open(path, "r", encoding="utf-8") as fh:
                  data = json.load(fh)
          except Exception as exc:
              print(f"::error::La respuesta no es JSON válido: {exc}")
              sys.exit(1)

          ok = data.get("ok")
          mail_sent = data.get("mail_sent")
          totals = data.get("totals", {}) or {}
          added = totals.get("added", 0)
          possible = totals.get("possible", 0)
          errors = totals.get("errors", 0)
          steps = totals.get("steps", 0)
          complete = data.get("complete")

          with open("prensa-monitor-summary.md", "w", encoding="utf-8") as fh:
              fh.write("# DDV Monitor de prensa semanal\n\n")
              fh.write(f"- ok: `{ok}`\n")
              fh.write(f"- mail_sent: `{mail_sent}`\n")
              fh.write(f"- added: `{added}`\n")
              fh.write(f"- possible: `{possible}`\n")
              fh.write(f"- errors: `{errors}`\n")
              fh.write(f"- steps: `{steps}`\n")
              fh.write(f"- complete: `{complete}`\n")

          print(f"ok={ok}")
          print(f"mail_sent={mail_sent}")
          print(f"added={added}")
          print(f"possible={possible}")
          print(f"errors={errors}")
          print(f"steps={steps}")
          print(f"complete={complete}")

          if ok is not True:
              print("::error::El monitor devolvió ok != true")
              sys.exit(1)
          if mail_sent is not True:
              print("::error::El monitor corrió pero mail_sent no es true")
              sys.exit(1)
          PY

      - name: Guardar respuesta como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ddv-prensa-monitor-response
          if-no-files-found: warn
          path: |
            prensa-monitor-response.json
            prensa-monitor-summary.md

      - name: Crear issue si falla
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'DDV Prensa Monitor — error en ejecución semanal';
            const body = [
              'Falló la ejecución semanal del monitor de prensa DDV.',
              '',
              `Workflow: ${context.workflow}`,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Revisar logs y artifact de respuesta.'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
