name: DDV Prensa Monitor Semanal

on:
  workflow_dispatch:
  schedule:
    # Lunes 09:30 Argentina = 12:30 UTC
    - cron: '30 12 * * 1'

permissions:
  contents: read
  issues: write

jobs:
  prensa-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Set up job
        run: |
          echo "Iniciando DDV Prensa Monitor Semanal..."

      - name: Verificar secret
        env:
          DDV_PRENSA_MONITOR_URL: ${{ secrets.DDV_PRENSA_MONITOR_URL }}
        run: |
          if [ -z "$DDV_PRENSA_MONITOR_URL" ]; then
            echo "ERROR: falta configurar el secret DDV_PRENSA_MONITOR_URL"
            exit 1
          fi
          echo "Secret DDV_PRENSA_MONITOR_URL configurado."

      - name: Parche DNS temporal para danieldelavega.com.ar
        run: |
          echo "Aplicando parche DNS temporal para GitHub Actions..."
          echo "23.111.161.86 danieldelavega.com.ar www.danieldelavega.com.ar" | sudo tee -a /etc/hosts
          echo "Contenido relevante de /etc/hosts:"
          grep "danieldelavega.com.ar" /etc/hosts || true
          echo "Prueba DNS local:"
          getent hosts www.danieldelavega.com.ar || true
          getent hosts danieldelavega.com.ar || true

      - name: Ejecutar monitor de prensa DDV
        id: ejecutar_monitor
        env:
          DDV_PRENSA_MONITOR_URL: ${{ secrets.DDV_PRENSA_MONITOR_URL }}
        run: |
          echo "Llamando al monitor de prensa..."

          http_code=$(curl \
            --silent \
            --show-error \
            --location \
            --max-time 120 \
            --retry 2 \
            --retry-delay 10 \
            --output respuesta-prensa-monitor.txt \
            --write-out "%{http_code}" \
            "$DDV_PRENSA_MONITOR_URL")

          echo "HTTP_CODE=$http_code" >> "$GITHUB_ENV"
          echo "Código HTTP recibido: $http_code"

          echo "---- Respuesta del monitor ----"
          cat respuesta-prensa-monitor.txt || true
          echo "-------------------------------"

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "ERROR: el monitor respondió con código HTTP $http_code"
            exit 1
          fi

          echo "Monitor de prensa ejecutado correctamente."

      - name: Guardar respuesta como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: respuesta-prensa-monitor
          path: respuesta-prensa-monitor.txt
          if-no-files-found: ignore

      - name: Crear issue si falla
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "DDV Prensa Monitor — error en ejecución semanal" \
            --body "Falló la ejecución semanal del monitor de prensa DDV.

          Workflow: DDV Prensa Monitor Semanal

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Código HTTP: ${HTTP_CODE:-sin código HTTP}

          Revisar logs y artifact de respuesta." || true

      - name: Complete job
        if: always()
        run: |
          echo "Finalizó DDV Prensa Monitor Semanal."              body
            });
